---
# User Service — ClusterIP (internal only, accessed through Ingress)
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: med-erp
  labels:
    app: user-service
spec:
  type: ClusterIP
  selector:
    app: user-service
  ports:
    - name: http
      port: 8081
      targetPort: 8081
      protocol: TCP

---
# Product Service — ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: product-service
  namespace: med-erp
  labels:
    app: product-service
spec:
  type: ClusterIP
  selector:
    app: product-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
      protocol: TCP

---
# Order Service — ClusterIP
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: med-erp
  labels:
    app: order-service
spec:
  type: ClusterIP
  selector:
    app: order-service
  ports:
    - name: http
      port: 8083
      targetPort: 8083
      protocol: TCP
