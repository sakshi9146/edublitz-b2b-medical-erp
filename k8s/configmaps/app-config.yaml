apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
  namespace: med-erp
  labels:
    app.kubernetes.io/part-of: med-erp
data:
  # Shared configuration across all services
  JWT_EXPIRATION: "86400000"
  JWT_REFRESH_EXPIRATION: "604800000"
  CORS_ALLOWED_ORIGINS: "*"
  LOW_STOCK_THRESHOLD: "10"

  # Inter-service URLs (using Kubernetes ClusterIP service names)
  PRODUCT_SERVICE_URL: "http://product-service:8082/api/v1"
  USER_SERVICE_URL: "http://user-service:8081/api/v1"
