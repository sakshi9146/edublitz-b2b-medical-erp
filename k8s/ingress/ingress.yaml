# AWS Application Load Balancer (ALB) via AWS Load Balancer Controller
# Prerequisites:
#   - AWS Load Balancer Controller installed on EKS (see KUBERNETES_DEPLOYMENT.md)
#   - IngressClass "alb" (apply ingressclass.yaml or use Helm defaults)
#   - ACM certificate ARN for your domain
#   - Route53 hosted zone configured
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: med-erp-ingress
  namespace: med-erp
  annotations:
    alb.ingress.kubernetes.io/scheme: internet-facing
    alb.ingress.kubernetes.io/target-type: ip
    alb.ingress.kubernetes.io/load-balancer-name: med-erp-alb

    # HTTPS — ACM cert MUST be in the SAME region as this ALB (e.g. ap-southeast-2).
    # Do NOT use a us-east-1 certificate here (those are for CloudFront only). ELB returns:
    # ValidationError: Certificate ARN 'arn:aws:acm:us-east-1:...' is not valid
    alb.ingress.kubernetes.io/listen-ports: '[{"HTTP": 80}, {"HTTPS": 443}]'
    alb.ingress.kubernetes.io/ssl-redirect: "443"
    alb.ingress.kubernetes.io/certificate-arn: arn:aws:acm:ap-southeast-2:898220629393:certificate/db70298f-ad3c-40aa-a2db-cdd35787fd82 # use ap-southeast-2

    # Health checks
    alb.ingress.kubernetes.io/healthcheck-path: /api/v1/actuator/health
    alb.ingress.kubernetes.io/healthcheck-interval-seconds: "30"
    alb.ingress.kubernetes.io/healthy-threshold-count: "2"
    alb.ingress.kubernetes.io/unhealthy-threshold-count: "3"

    # WAF (optional)
    # alb.ingress.kubernetes.io/wafv2-acl-arn: arn:aws:wafv2:...

    # Security groups
    alb.ingress.kubernetes.io/security-groups: sg-0134c9fc2609a4e2e

    # Tags
    alb.ingress.kubernetes.io/tags: "Environment=production,Project=med-erp"
spec:
  ingressClassName: alb
  rules:
    - host: api.edublitzb2berp.online
      http:
        paths:
          - path: /api/v1/auth
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/v1/users
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/v1/organizations
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 8081
          - path: /api/v1/products
            pathType: Prefix
            backend:
              service:
                name: product-service
                port:
                  number: 8082
          - path: /api/v1/orders
            pathType: Prefix
            backend:
              service:
                name: order-service
                port:
                  number: 8083
