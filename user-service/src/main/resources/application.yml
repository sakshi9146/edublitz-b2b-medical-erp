server:
  port: 8081
  servlet:
    context-path: /api/v1

spring:
  application:
    name: user-service
  data:
    mongodb:
      uri: ${MONGODB_URI:mongodb+srv://demo:redhat@edublitz.i7cujo7.mongodb.net/users_db?appName=Edublitz}
      database: users_db
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  expiration: ${JWT_EXPIRATION:86400000}   # 24 hours in ms
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7 days

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: when-authorized

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  info:
    title: User Service API
    description: Authentication, Authorization, and Organization Management
    version: 1.0.0

logging:
  level:
    com.edublitz: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:*}

# ── Seed / Bootstrap ─────────────────────────────────────────────────────────
# On first startup, if no ADMIN exists, these values are used to create
# a default organization and admin user automatically.
# Override via environment variables before deploying to production.
seed:
  admin:
    email: ${SEED_ADMIN_EMAIL:admin@medicalerp.com}
    password: ${SEED_ADMIN_PASSWORD:Admin@123456}
  org:
    name: ${SEED_ORG_NAME:MedERP HQ}
    registration-number: ${SEED_ORG_REG_NUMBER:HQ-0001}
